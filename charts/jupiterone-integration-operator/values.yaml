# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: ghcr.io/jupiterone/jupiterone-integration-operator
      tag: "" # Use the appVersion from the chart unless overridden by command line
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
    env:
      JOB_TTL_SECONDS: "604800" # 7 days in seconds
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: jupiterone-integration-operator-controller-manager
  # Image registry override for private registry environments.
  # When set, integration job images are pulled from this registry instead of ghcr.io.
  # Example: "myregistry.example.com" produces images like "myregistry.example.com/jupiterone/graph-aws:latest"
  imageRegistry: ""
  # Disable cosign image signature verification for integration job images.
  # Set to true when using private registries that don't mirror ghcr.io cosign signatures.
  # When false or unset, cosign verification runs as normal against ghcr.io signatures.
  disableImageSignatureCheck: false
  # Secrets for pulling images from private registries.
  # Applied to both the operator Deployment pod and propagated to spawned integration job pods.
  # Example:
  #   imagePullSecrets:
  #     - name: my-registry-secret
  imagePullSecrets: []
  # Resource requests and limits applied to integration job containers.
  # Configure these to comply with cluster resource policies (e.g. Kyverno, OPA/Gatekeeper).
  # When empty, no resource requirements are set on job containers.
  # Example:
  #   jobResources:
  #     requests:
  #       cpu: 100m
  #       memory: 256Mi
  #     limits:
  #       cpu: "1"
  #       memory: 1Gi
  jobResources: {}

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: false

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [INTEGRATION]: Kubernetes Managed Integration RBAC configuration
integration:
  # Specifies whether to create integration RBAC resources
  create: true
  # Service account name for the cluster role binding
  serviceAccountName: jupiterone
  # Service account namespace for the cluster role binding
  # NOTE: We don't support changing this at this time
  serviceAccountNamespace: jupiterone
